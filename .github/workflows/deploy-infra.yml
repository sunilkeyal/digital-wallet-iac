name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_region: ${{ vars.OCI_REGION || 'us-ashburn-1' }}
  TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_app_admin_password: ${{ secrets.APP_ADMIN_PASSWORD }}
  TF_VAR_name_prefix: ${{ vars.TF_VAR_name_prefix || 'dw' }}

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI credentials
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          OCI_DIR="$HOME/.oci"
          mkdir -p "$OCI_DIR"

          printf '%s\n' "[DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION || 'us-ashburn-1' }}
          key_file=$OCI_DIR/oci_api_key.pem" > "$OCI_DIR/config"

          printf '%s\n' "$OCI_PRIVATE_KEY" > "$OCI_DIR/oci_api_key.pem"
          chmod 600 "$OCI_DIR/oci_api_key.pem" "$OCI_DIR/config"

          # Debug: verify files
          echo "=== HOME ==="
          echo "$HOME"
          echo "=== Config file ==="
          head -3 "$OCI_DIR/config"
          echo "..."
          tail -1 "$OCI_DIR/config"
          echo "=== Key file (first line) ==="
          head -1 "$OCI_DIR/oci_api_key.pem"
          echo "=== Key file (last line) ==="
          tail -1 "$OCI_DIR/oci_api_key.pem"

          # Set Terraform OCI provider env vars
          echo "OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}" >> "$GITHUB_ENV"
          echo "OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}" >> "$GITHUB_ENV"
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> "$GITHUB_ENV"
          echo "OCI_REGION=${{ vars.OCI_REGION || 'us-ashburn-1' }}" >> "$GITHUB_ENV"
          echo "OCI_KEY_FILE=$OCI_DIR/oci_api_key.pem" >> "$GITHUB_ENV"

          pip install -q oci-cli

      - name: Verify OCI CLI auth
        run: |
          echo "=== Testing OCI CLI auth ==="
          oci os ns get || echo "OCI CLI auth FAILED"

      - name: Create state bucket
        run: |
          oci os bucket create --name digital-wallet-tfstate \
            --compartment-id ${{ secrets.OCI_TENANCY_OCID }} || echo "Bucket may already exist"

      - name: Download Terraform state from OCI
        run: |
          oci os object get --bucket-name digital-wallet-tfstate \
            --name terraform.tfstate --file terraform.tfstate || echo "No existing state"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Debug env vars (non-sensitive)
        run: |
          echo "=== Env vars for Terraform ==="
          echo "OCI_REGION=$OCI_REGION"
          echo "OCI_KEY_FILE=$OCI_KEY_FILE"
          echo "OCI_TENANCY_OCID length: ${#OCI_TENANCY_OCID}"
          echo "OCI_USER_OCID length: ${#OCI_USER_OCID}"
          echo "OCI_FINGERPRINT=$OCI_FINGERPRINT"
          ls -la "$OCI_KEY_FILE"

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Upload Terraform state to OCI
        run: |
          oci os object put --bucket-name digital-wallet-tfstate \
            --name terraform.tfstate --file terraform.tfstate --force
