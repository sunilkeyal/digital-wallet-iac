name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_region: ${{ vars.OCI_REGION || 'us-ashburn-1' }}
  TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_app_admin_password: ${{ secrets.APP_ADMIN_PASSWORD }}
  TF_VAR_name_prefix: ${{ vars.TF_VAR_name_prefix || 'dw' }}

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI CLI and create state bucket
        run: |
          mkdir -p $HOME/.oci
          cat > $HOME/.oci/config << OCIEOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION || 'us-ashburn-1' }}
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
          printf '%s\n' '${{ secrets.OCI_PRIVATE_KEY }}' > $HOME/.oci/oci_api_key.pem
          chmod 600 $HOME/.oci/oci_api_key.pem

          # Install OCI CLI and create state bucket
          pip install -q oci-cli
          oci os bucket create --name digital-wallet-tfstate \
            --compartment-id ${{ secrets.OCI_TENANCY_OCID }} 2>/dev/null || echo "Bucket already exists"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform init
        run: |
          OCI_NS="${{ vars.OCI_OBJECT_STORAGE_NAMESPACE || 'idldc0hw0bpz' }}"
          OCI_REGION="${{ vars.OCI_REGION || 'us-ashburn-1' }}"
          S3_ENDPOINT="https://${OCI_NS}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          terraform init \
            -backend-config="bucket=digital-wallet-tfstate" \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=${S3_ENDPOINT}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true"

      - name: Terraform apply
        run: terraform apply -auto-approve
