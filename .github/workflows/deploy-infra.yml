name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_region: ${{ vars.OCI_REGION || 'us-ashburn-1' }}
  TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_app_admin_password: ${{ secrets.APP_ADMIN_PASSWORD }}
  TF_VAR_name_prefix: ${{ vars.TF_VAR_name_prefix || 'dw' }}

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-wallet-iac
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          cli_config_credentials_token: ${{ secrets.TFE_TOKEN }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
