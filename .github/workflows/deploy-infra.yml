name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'terraform.tfvars.example'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'terraform.tfvars.example'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_resource_prefix: ${{ vars.TF_RESOURCE_PREFIX || 'dw' }}
  TF_VAR_resource_group_name: ${{ vars.TF_RESOURCE_GROUP_NAME || 'digital-wallet-rg' }}
  TF_VAR_location: ${{ vars.TF_LOCATION || 'eastus' }}
  TF_VAR_backend_port: ${{ vars.TF_BACKEND_PORT || '8080' }}
  TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
  TF_CLOUD_WORKSPACE: ${{ vars.TF_CLOUD_WORKSPACE || 'digital-wallet-iac' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend needed for validation)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Azure OIDC token → access token
        run: |
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          ACCESS_TOKEN=$(curl -sSL \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "scope=https://management.azure.com/.default" \
            -d "grant_type=client_credentials" \
            -d "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            -d "client_assertion=$OIDC_TOKEN" \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            | jq -r '.access_token')

          echo "ARM_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Terraform init (Terraform Cloud)
        run: |
          cat > backend.tfbackend <<'EOF'
          organization = "${{ env.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${{ env.TF_CLOUD_WORKSPACE }}"
          }
          token = "${{ secrets.TFE_TOKEN }}"
          EOF
          terraform init -backend-config=backend.tfbackend

      - name: Terraform plan
        run: terraform plan

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ${{ vars.TF_ENVIRONMENT || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Azure OIDC token → access token
        run: |
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          ACCESS_TOKEN=$(curl -sSL \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "scope=https://management.azure.com/.default" \
            -d "grant_type=client_credentials" \
            -d "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            -d "client_assertion=$OIDC_TOKEN" \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            | jq -r '.access_token')

          echo "ARM_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Terraform init (Terraform Cloud)
        run: |
          cat > backend.tfbackend <<'EOF'
          organization = "${{ env.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${{ env.TF_CLOUD_WORKSPACE }}"
          }
          token = "${{ secrets.TFE_TOKEN }}"
          EOF
          terraform init -backend-config=backend.tfbackend

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        run: terraform apply -auto-approve
